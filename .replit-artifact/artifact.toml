kind = "web"
previewPath = "/"
title = "Samsung S21 FE vs Tab S7"
version = "1.0.0"
id = "artifacts/samsung-compare"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25878

[services.development]
run = "pnpm --filter @workspace/samsung-compare run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/samsung-compare", "run", "build" ]
publicDir = "artifacts/samsung-compare/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25878"
BASE_PATH = "/"
